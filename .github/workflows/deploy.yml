name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-frontend-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://encor-krd.ru
        run: npm run build

      - name: Ensure deploy dir exists
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          port: 22
          script: |
            set -e
            mkdir -p /var/www/encor/frontend

      - name: Upload project files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          port: 22
          source: "package.json,package-lock.json,next.config.ts,public,.next,ecosystem.config.cjs"
          target: "/var/www/encor/frontend"

      - name: Restart with PM2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          port: 22
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
              nvm use --lts >/dev/null 2>&1 || true
            fi
            if ! command -v npm >/dev/null 2>&1; then
              echo "npm not found on VM. Install Node.js or configure nvm for user $USER."
              exit 127
            fi
            cd /var/www/encor/frontend
            if [ ! -d node_modules ] || [ ! -f .package-lock.sha256 ] || ! sha256sum -c .package-lock.sha256 >/dev/null 2>&1; then
              npm ci --omit=dev --no-audit --no-fund
              sha256sum package-lock.json > .package-lock.sha256
            fi
            pm2 startOrReload ecosystem.config.cjs --env production
            pm2 save
